virtual_modifiers:
  - CapsLock
  - RIGHTCTRL
modmap:
  - name: CapsLock tap=Escape, hold=modifier
    remap:
      CapsLock:
        held: CapsLock
        alone: Esc
        alone_timeout_millis: 200

keymap:
  # --- Kitty-specific overrides (must come BEFORE general CapsLock layer) ---
  - name: Kitty overrides
    application:
      only: ["kitty"]
    remap:
      Alt-c: C-S-c # Alt+C → Ctrl+Shift+C (copy in kitty)
      CapsLock-DOT: C-S-v # CapsLock+. → Alt+Shift+V (paste in kitty)

  # --- CapsLock layer ---
  - name: CapsLock layer
    remap:
      # Navigation
      CapsLock-h: Left
      CapsLock-j: Down
      CapsLock-k: Up
      CapsLock-l: Right
      CapsLock-o: C-Left
      CapsLock-p: C-Right
      CapsLock-LEFTBRACE: PageUp
      CapsLock-APOSTROPHE: PageDown
      # Actions
      CapsLock-n: Enter
      CapsLock-SEMICOLON: [End, Enter]
      CapsLock-i: [C-a, BackSpace]
      CapsLock-g: [C-a, C-c, Right]
      CapsLock-y: C-z
      CapsLock-SLASH: A-F4
      CapsLock-m: BackSpace
      CapsLock-u: C-BackSpace
      CapsLock-d: Delete
      CapsLock-f: C-f
      CapsLock-DOT: C-v
      CapsLock-COMMA: [C-a, C-c]
      # F-key row
      CapsLock-1: F1
      CapsLock-2: F2
      CapsLock-3: F3
      CapsLock-4: F4
      CapsLock-5: F5
      CapsLock-6: F6
      CapsLock-7: F7
      CapsLock-8: F8
      CapsLock-9: F9
      CapsLock-0: F10
      CapsLock-MINUS: F11
      CapsLock-EQUAL: F12
      # Brightness
      CapsLock-RIGHTBRACE:
        launch: ["brightnessctl", "set", "+10%"]
      CapsLock-BACKSLASH:
        launch: ["brightnessctl", "set", "10%-"]
      # Passthrough
      CapsLock-a: a
      CapsLock-b: b
      CapsLock-c: c
      CapsLock-e: e
      CapsLock-q: q
      CapsLock-s: s
      CapsLock-t: t
      CapsLock-v: v
      CapsLock-w: w
      CapsLock-x: x
      CapsLock-z: z

  # --- RControl mirror layer ---
  - name: RCtrl layer
    remap:
      RIGHTCTRL-h: Left
      RIGHTCTRL-j: Down
      RIGHTCTRL-k: Up
      RIGHTCTRL-l: Right
      RIGHTCTRL-n: Enter
      RIGHTCTRL-i: [C-a, BackSpace]
      RIGHTCTRL-g: [C-a, C-c, Right]
      RIGHTCTRL-y: C-z
      RIGHTCTRL-SLASH: A-F4
      RIGHTCTRL-o: C-Left
      RIGHTCTRL-p: C-Right
      RIGHTCTRL-m: BackSpace
      RIGHTCTRL-u: C-BackSpace
      # Passthrough
      RIGHTCTRL-a: a
      RIGHTCTRL-b: b
      RIGHTCTRL-c: c
      RIGHTCTRL-e: e
      RIGHTCTRL-q: q
      RIGHTCTRL-s: s
      RIGHTCTRL-t: t
      RIGHTCTRL-v: v
      RIGHTCTRL-w: w
      RIGHTCTRL-x: x
      RIGHTCTRL-z: z

  # --- Misc ---
  - name: Misc
    remap:
      Alt-BackSpace: A-Left
      PageUp: Home
