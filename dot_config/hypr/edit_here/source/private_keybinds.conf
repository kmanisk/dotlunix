# ==============================================================================
# USER CONFIGURATION: keybinds.conf
# ==============================================================================
# Add your custom settings for keybinds here.
# These will override or add to the defaults found in ~/.config/hypr/source/keybinds.conf
# ==============================================================================

# -------------------------------------------------------------------------------------------------
# VARIABLES
# -------------------------------------------------------------------------------------------------
$mainMod = SUPER

# -------------------------------------------------------------------------------------------------
# CONFLICT RESOLUTIONS
# Keeping old keybinds, moving new upstream functions to SHIFT variants
#
# ALT+P           → App launcher (old)    | ALT+SHIFT+P  → Mute audio (upstream)
# ALT+M           → Spotify (old)         | ALT+SHIFT+M  → Mono audio toggle (upstream)
# ALT+B           → Browser (old)         | ALT+SHIFT+B  → Brightness slider (old location)
# SUPER+Q         → Edit keybinds (old)   | Terminal available at ALT+RETURN
# SUPER+ALT+M     → Spotify toggle (old)  | SUPER+CTRL+M → Music recognition (upstream)
# -------------------------------------------------------------------------------------------------

## ALT + P
unbind = ALT, P
bindd = ALT, P, Launch Menu for Apps, exec, pkill rofi; rofi -show drun -run-command "uwsm app -- {cmd}"
# bindld = ALT SHIFT, P, Mute Audio, exec, $osdclient --output-volume mute-toggle

## ALT + M
unbind = ALT, M
bindd = ALT, M, Open Spotify, exec, prime-run spotify
# bindld = ALT SHIFT, M, Mono Audio Toggle, exec, $scripts/audio/mono_audio_pipewire.sh

## ALT + B
unbind = ALT, B
bindd = ALT, B, Open Browser, exec, prime-run firefox

## SUPER + ALT + M
unbind = $mainMod ALT, M
bindd = ALT SHIFT, M, Spotify Toggle, exec, uwsm-app -- $scripts/spotify/spotify_toggle.sh
bindd = $mainMod CTRL, M, Music Recognition, exec, uwsm-app -- kitty --class music_recognition.sh -e $scripts/music/music_recognition.sh

# -------------------------------------------------------------------------------------------------
# ADDITIONAL KEYBINDS
# -------------------------------------------------------------------------------------------------

# Terminal
bindd = ALT, RETURN, Terminal, exec, $terminal

# File Manager
bindd = ALT, E, File Manager, exec, uwsm-app $fileManager

# Text Editor (nvim)
bindd = $mainMod SHIFT, T, Open Text Editor, exec, kitty --class nvim -e nvim
bindd = ALT SHIFT, T, Open Text Editor, exec, kitty --class nvim -e nvim

# Web Search
bindd = ALT SHIFT, Q, Web Search, exec, uwsm-app -- ~/.config/scripts/rofi-websearch

# Window Management
bindd = ALT, W, Close Active Window, killactive

# System Utilities
bindd = ALT SHIFT, 2, Bluetooth Manager, exec, uwsm-app -- blueman-manager
bindd = ALT SHIFT, 3, Audio Mixer, exec, uwsm-app -- pavucontrol
bindd = ALT SHIFT, 4, Wallpaper App, exec, uwsm-app -- waypaper

# Brightness & Audio
bindd = ALT SHIFT, B, Brightness Slider, exec, uwsm-app -- $scripts/sliders/brightness_slider.sh
bindd = ALT, N, Mute Audio, exec, $osdclient --output-volume mute-toggle

# Sequential Workspace Switching
bindd = $mainMod, BRACKETLEFT, Prev Workspace, workspace, -1
bindd = $mainMod, BRACKETRIGHT, Next Workspace, workspace, +1
bindd = $mainMod SHIFT, BRACKETLEFT, Move Window to Prev Workspace, movetoworkspace, -1
bindd = $mainMod SHIFT, BRACKETRIGHT, Move Window to Next Workspace, movetoworkspace, +1

# Home-row Workspace Navigation
bindd = ALT, A, Workspace 1, workspace, 1
bindd = ALT, S, Workspace 2, workspace, 2
bindd = ALT, D, Workspace 3, workspace, 3
bindd = ALT, F, Workspace 4, workspace, 4
bindd = ALT, G, Workspace 5, workspace, 5

bindd = ALT SHIFT, A, Move Window to Workspace 1, movetoworkspace, 1
bindd = ALT SHIFT, S, Move Window to Workspace 2, movetoworkspace, 2
bindd = ALT SHIFT, D, Move Window to Workspace 3, movetoworkspace, 3
bindd = ALT SHIFT, F, Move Window to Workspace 4, movetoworkspace, 4
bindd = ALT SHIFT, G, Move Window to Workspace 5, movetoworkspace, 5

# Scratchpad
bindd = ALT, Z, Toggle Scratchpad, togglespecialworkspace, magic
bindd = ALT SHIFT, Z, Move to Scratchpad, movetoworkspace, special:magic

# Install Packages Window
bindd = ALT SHIFT, I, Direct Install Window, exec, hyprctl dispatch exec "[float;size 60% 70%;center] kitty --title 'Install Packages' -e bash -c '$HOME/work/install; read -n 1 -s -r -p \"Press any key to close...\"'"

# Clipboard History
# -- TERMINAL-CLIPBOARD-START --
unbind = $mainMod, V
bindd = $mainMod, V, Clipboard History, exec, $scripts/clipboard/close_terminal_clipboard.sh uwsm-app -- kitty --class terminal_clipboard.sh -e "$scripts/clipboard/terminal_clipboard.sh"
# -- TERMINAL-CLIPBOARD-END --

# Silent Move to Context 9
unbind = $mainMod ALT, 9
bindd = $mainMod CTRL, p, Silent Move To Context 9, exec, $ws_script movetoworkspacesilent 9

# -------------------------------------------------------------------------------------------------
# FOCUS / RESIZE / MOVE WINDOWS (hjkl)
# -------------------------------------------------------------------------------------------------

unbind = ALT, H

# Focus movement (ALT + hjkl)
bind = ALT, h, movefocus, l
bind = ALT, l, movefocus, r
bind = ALT, k, movefocus, u
bind = ALT, j, movefocus, d

# Resize windows (ALT + SHIFT + hjkl)
binde = ALT SHIFT, h, resizeactive, -50 0
binde = ALT SHIFT, l, resizeactive, 50 0
binde = ALT SHIFT, k, resizeactive, 0 -50
binde = ALT SHIFT, j, resizeactive, 0 50

# Move active window (SUPER + hjkl)
unbind = $mainMod, h
unbind = $mainMod, j
unbind = $mainMod, k
unbind = $mainMod, l
unbind = $mainMod SHIFT, h
unbind = $mainMod SHIFT, j
unbind = $mainMod SHIFT, k
unbind = $mainMod SHIFT, l

bind = $mainMod, h, movewindow, l
bind = $mainMod, j, movewindow, d
bind = $mainMod, k, movewindow, u
bind = $mainMod, l, movewindow, r

# -------------------------------------------------------------------------------------------------
# MISC
# -------------------------------------------------------------------------------------------------

# Theme switcher
bind = $mainMod, /, exec, uwsm-app -- /home/manisk/theme.sh

# Hyprsunset slider
bindd = ALT SHIFT, N, Hyprsunset Slider, exec, uwsm-app -- $scripts/sliders/hyprsunset_slider.sh


# [2026-02-19 23:55] SRC
unbind = $mainMod, Q
bindd = $mainMod, Q, Launch Terminal, exec, uwsm-app -- $terminal -e nvim $HOME/.config/hypr/edit_here/source/keybinds.conf

# [2026-02-20 00:21] SRC
unbind = CTRL SHIFT, escape
bindd = CTRL SHIFT, escape, System Monitor, exec, uwsm-app -- $terminal --class dgop -e btop

# [2026-02-20 01:34] SRC
submap = passthrough
unbind = ALT, 6
bindld = ALT, 6, Game Mode (Enable Keybinds), exec, notify-send -u low -t 2000 "Passthrough Disabled" "Keybinds restored"; hyprctl dispatch submap reset
submap = reset



bindd = $mainMod SHIFT, H, Add Favorite, exec, uwsm-app -- /home/manisk/Documents/dusky/user_scripts/theme_matugen/theme_favorites_ctl.sh toggle

bindd = $mainMod SHIFT, apostrophe, Cycle Favorite, exec, uwsm-app -- /home/manisk/Documents/dusky/user_scripts/theme_matugen/theme_favorites_ctl.sh cycle

bindd = $mainMod SHIFT, D, Remove Favorite, exec, uwsm-app -- /home/manisk/Documents/dusky/user_scripts/theme_matugen/theme_favorites_ctl.sh remove

bind = SUPER SHIFT, W, exec, /home/manisk/Documents/dusky/user_scripts/rofi/rofi_wallpaper_selctor.sh fav

# Auto-generated by Browser Switcher
bindd = $mainMod, W, Launch Browser, exec, uwsm-app -- $browser

# Auto-generated by Text Editor Switcher
bindd = $mainMod, R, Open Text Editor, exec, uwsm-app -- $terminal --class nvim -e $textEditor
